version: "3.9"
services:  
  manga-renamer:
    command: sh -c "apk add --no-cache bash && while true; do python3 /renamer.py; sleep 600; done"
    container_name: manga-renamer
    image: python:3.11-alpine
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    restart: unless-stopped
    networks:
      - media-net
    volumes:
      - /home/dbzorin/Documents/scripts/renamer.py:/renamer.py:ro
      - /home/dbzorin/Documents/shared/manga:/mangas:rw
      - /mnt/Downloads/manga-downloads/mangas:/downloads:rw
      
networks:
 media-net:
   external: true
